[providers]
providers = ['php', 'node']

[phases.setup]
nixPkgs = ['php82', 'php82Extensions.sqlite3', 'php82Extensions.pdo_sqlite', 'composer', 'nodejs']

[phases.build]
cmds = [
  'composer install --ignore-platform-reqs --no-dev --optimize-autoloader',
  'npm install',
  'npm run build',
  'touch database/database.sqlite',
  'php artisan migrate --force'
]

[start]
cmd = 'php artisan serve --host=0.0.0.0 --port=$PORT'
