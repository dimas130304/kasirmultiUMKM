[phases.setup]
nixPkgs = ['php82', 'php82Packages.composer', 'php82Extensions.pdo_mysql', 'nodejs_20']

[phases.build]
cmds = [
    'composer install --ignore-platform-reqs --no-dev --optimize-autoloader',
    'npm ci || npm install',
    'npm run build'
]

[start]
cmd = 'php artisan config:clear && php artisan cache:clear && php artisan storage:link --force && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT'