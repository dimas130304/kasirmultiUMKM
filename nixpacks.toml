[phases.setup]
nixPkgs = ['php82', 'php82Packages.composer', 'php82Extensions.pdo_mysql', 'nodejs_18']

[phases.build]
cmds = [
    'composer install --ignore-platform-reqs --no-dev --optimize-autoloader',
    'npm ci || npm install',
    'npm run build'
]

[start]
cmd = 'php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate --force && vendor/bin/heroku-php-nginx -p $PORT public/'