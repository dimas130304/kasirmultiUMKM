[providers]
providers = ['php']

[phases.setup]
nixPkgs = ['php82', 'php82Packages.composer']

[phases.build]
cmds = [
  'composer install --ignore-platform-reqs --no-dev --optimize-autoloader',
  'touch database/database.sqlite',
  'php artisan migrate --force'
]

[start]
cmd = 'php artisan serve --host=0.0.0.0 --port=$PORT'